<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Talon — Built to Win</title>
<meta name="description" content="Talon builds the habit. The user builds the outcome." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #030c20;
–bg-deep: #01050f;
–surface: #0a1628;
–border: rgba(255,255,255,0.07);
–text: rgba(255,255,255,0.88);
–muted: rgba(255,255,255,0.45);
–dim: rgba(255,255,255,0.32);
–accent: #3B82F6;
–accent-deep: #2563eb;
–accent-glow: rgba(59, 130, 246, 0.55);
–cinzel-dec: ‘Cinzel Decorative’, serif;
–cinzel: ‘Cinzel’, serif;
–mono: ‘IBM Plex Mono’, monospace;
}

html, body { height: 100%; }
body {
background: var(–bg);
color: var(–text);
font-family: var(–mono);
font-weight: 300;
font-size: 15px;
line-height: 1.8;
min-height: 100vh;
overflow-x: hidden;
position: relative;
}

/* STAR FIELD */
body::before {
content: ‘’;
position: fixed; inset: 0;
background-image:
radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.55), transparent),
radial-gradient(1px 1px at 34% 72%, rgba(255,255,255,0.35), transparent),
radial-gradient(1.5px 1.5px at 56% 9%, rgba(255,255,255,0.6), transparent),
radial-gradient(1px 1px at 78% 55%, rgba(255,255,255,0.3), transparent),
radial-gradient(1px 1px at 91% 31%, rgba(255,255,255,0.45), transparent),
radial-gradient(1.5px 1.5px at 7% 85%, rgba(255,255,255,0.55), transparent),
radial-gradient(1px 1px at 63% 44%, rgba(255,255,255,0.3), transparent),
radial-gradient(1px 1px at 45% 92%, rgba(255,255,255,0.25), transparent),
radial-gradient(1px 1px at 22% 61%, rgba(255,255,255,0.3), transparent),
radial-gradient(1.5px 1.5px at 87% 78%, rgba(255,255,255,0.4), transparent),
radial-gradient(1px 1px at 15% 45%, rgba(255,255,255,0.3), transparent),
radial-gradient(1px 1px at 72% 22%, rgba(255,255,255,0.35), transparent),
radial-gradient(1px 1px at 38% 38%, rgba(255,255,255,0.2), transparent),
radial-gradient(1px 1px at 95% 68%, rgba(255,255,255,0.3), transparent),
radial-gradient(1px 1px at 5% 28%, rgba(255,255,255,0.25), transparent),
radial-gradient(1px 1px at 50% 15%, rgba(255,255,255,0.3), transparent),
radial-gradient(1px 1px at 28% 82%, rgba(255,255,255,0.25), transparent);
pointer-events: none;
z-index: 0;
animation: twinkle 10s ease-in-out infinite;
}

/* VIGNETTE */
body::after {
content: ‘’;
position: fixed; inset: 0;
background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.55) 85%, rgba(0,0,0,0.85) 100%);
pointer-events: none;
z-index: 1;
}

@keyframes twinkle {
0%, 100% { opacity: 0.75; }
50% { opacity: 1; }
}

/* NAV — portal-dominant: wordmark anchors, About/Privacy muted and small */
nav.top-nav {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 20;
padding: 24px 44px;
display: flex;
justify-content: space-between;
align-items: center;
background: linear-gradient(180deg, rgba(3,12,32,0.92) 0%, rgba(3,12,32,0.4) 70%, transparent 100%);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);
}

.wordmark {
font-family: var(–cinzel);
font-size: 14px;
font-weight: 700;
letter-spacing: 0.48em;
text-transform: uppercase;
color: #fff;
text-decoration: none;
text-shadow: 0 0 18px rgba(59, 130, 246, 0.25);
transition: text-shadow 0.4s ease;
}
.wordmark:hover {
text-shadow: 0 0 24px rgba(59, 130, 246, 0.5);
}

.nav-links {
display: flex;
gap: 26px;
list-style: none;
}
.nav-links a {
font-family: var(–cinzel);
font-size: 9px;
font-weight: 500;
letter-spacing: 0.32em;
text-transform: uppercase;
color: var(–dim);
text-decoration: none;
padding: 4px 0;
position: relative;
transition: color 0.4s ease;
}
.nav-links a::after {
content: ‘’;
position: absolute;
bottom: 0; left: 50%;
transform: translateX(-50%);
width: 0;
height: 1px;
background: var(–accent);
box-shadow: 0 0 8px var(–accent-glow);
transition: width 0.4s ease;
}
.nav-links a:hover { color: rgba(255,255,255,0.75); }
.nav-links a:hover::after { width: 100%; }

/* HERO */
.hero {
position: relative;
z-index: 2;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 120px 24px 80px;
}

.hero-eyebrow {
font-family: var(–cinzel);
font-size: 11px;
letter-spacing: 0.42em;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 56px;
animation: fadeIn 1.4s ease 0.2s both;
display: flex;
align-items: center;
gap: 16px;
}
.hero-eyebrow span.line {
display: inline-block;
width: 40px;
height: 1px;
background: var(–muted);
}

/* ORB */
.orb-wrap {
position: relative;
width: 360px;
height: 360px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
animation: fadeIn 2s ease 0.6s both;
text-decoration: none;
border: none;
background: transparent;
}

.orb-glow-outer {
position: absolute;
inset: -140px;
border-radius: 50%;
background: radial-gradient(circle,
rgba(59, 130, 246, 0.22) 0%,
rgba(37, 99, 235, 0.12) 28%,
rgba(37, 99, 235, 0.05) 50%,
transparent 72%);
filter: blur(24px);
animation: pulse-outer 5s ease-in-out infinite;
pointer-events: none;
}

.orb-glow-mid {
position: absolute;
inset: -50px;
border-radius: 50%;
background: radial-gradient(circle,
rgba(59, 130, 246, 0.4) 0%,
rgba(37, 99, 235, 0.22) 35%,
transparent 72%);
filter: blur(14px);
animation: pulse-mid 5s ease-in-out infinite;
pointer-events: none;
}

.orb-body {
position: relative;
width: 280px;
height: 280px;
border-radius: 50%;
background:
radial-gradient(circle at 32% 28%,
rgba(147, 197, 253, 0.35) 0%,
rgba(59, 130, 246, 0.18) 15%,
rgba(10, 22, 40, 0.9) 38%,
rgba(3, 12, 32, 0.98) 60%,
#01050f 100%);
box-shadow:
inset 0 0 70px rgba(59, 130, 246, 0.32),
inset 0 0 140px rgba(1, 5, 15, 0.9),
0 0 90px rgba(59, 130, 246, 0.55),
0 0 180px rgba(37, 99, 235, 0.32);
border: 1px solid rgba(59, 130, 246, 0.35);
animation: breathe 6s ease-in-out infinite;
transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
box-shadow 0.7s ease,
border-color 0.7s ease;
display: flex;
align-items: center;
justify-content: center;
}

.orb-body::before {
content: ‘’;
position: absolute;
top: 16%; left: 20%;
width: 32%; height: 22%;
border-radius: 50%;
background: radial-gradient(ellipse,
rgba(255, 255, 255, 0.18) 0%,
transparent 70%);
filter: blur(10px);
}

.orb-body::after {
content: ‘’;
position: absolute;
inset: 6px;
border-radius: 50%;
border: 1px solid rgba(147, 197, 253, 0.12);
pointer-events: none;
}

.orb-label {
position: relative;
z-index: 3;
font-family: var(–cinzel);
font-size: 11px;
letter-spacing: 0.45em;
color: rgba(255, 255, 255, 0.6);
text-transform: uppercase;
text-shadow: 0 0 14px rgba(59, 130, 246, 0.8);
transition: color 0.5s ease, letter-spacing 0.5s ease, text-shadow 0.5s ease;
pointer-events: none;
user-select: none;
}

.orb-wrap:hover .orb-body {
transform: scale(1.06);
border-color: rgba(147, 197, 253, 0.6);
box-shadow:
inset 0 0 80px rgba(147, 197, 253, 0.45),
inset 0 0 140px rgba(1, 5, 15, 0.85),
0 0 140px rgba(147, 197, 253, 0.7),
0 0 260px rgba(59, 130, 246, 0.5);
}
.orb-wrap:hover .orb-label {
color: #fff;
letter-spacing: 0.55em;
text-shadow: 0 0 20px rgba(255, 255, 255, 0.9), 0 0 40px rgba(147, 197, 253, 1);
}
.orb-wrap:hover .orb-glow-outer { animation-duration: 2.5s; }
.orb-wrap:active .orb-body { transform: scale(0.98); }

@keyframes breathe {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.025); }
}
@keyframes pulse-outer {
0%, 100% { opacity: 0.65; transform: scale(1); }
50% { opacity: 1; transform: scale(1.04); }
}
@keyframes pulse-mid {
0%, 100% { opacity: 0.7; }
50% { opacity: 1; }
}
@keyframes fadeIn {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}

/* HERO FOOTER */
.hero-footer {
margin-top: 64px;
text-align: center;
animation: fadeIn 2s ease 1.2s both;
}

.hero-headline {
font-family: var(–cinzel-dec);
font-size: clamp(28px, 5vw, 46px);
font-weight: 700;
letter-spacing: 0.08em;
color: #fff;
margin-bottom: 18px;
line-height: 1.2;
text-shadow: 0 0 30px rgba(59, 130, 246, 0.25);
}

.hero-tagline {
font-family: var(–cinzel);
font-size: 11px;
letter-spacing: 0.38em;
color: var(–muted);
text-transform: uppercase;
}

/* FOOTER */
footer.site-footer {
position: relative;
z-index: 2;
padding: 36px 20px;
text-align: center;
border-top: 1px solid var(–border);
}
.footer-mark {
font-family: var(–cinzel);
font-size: 10px;
letter-spacing: 0.38em;
color: var(–muted);
text-transform: uppercase;
}

/* MODAL OVERLAY */
.modal-overlay {
position: fixed; inset: 0;
background: rgba(3, 12, 32, 0.88);
backdrop-filter: blur(14px);
-webkit-backdrop-filter: blur(14px);
z-index: 100;
display: flex;
align-items: center;
justify-content: center;
opacity: 0;
pointer-events: none;
transition: opacity 0.5s ease;
}
.modal-overlay.active {
opacity: 1;
pointer-events: auto;
}

.modal {
max-width: 440px;
width: calc(100% - 48px);
padding: 48px 40px;
background: var(–surface);
border: 1px solid rgba(59, 130, 246, 0.3);
border-radius: 14px;
text-align: center;
box-shadow: 0 0 80px rgba(37, 99, 235, 0.22);
transform: translateY(20px) scale(0.96);
transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.modal-overlay.active .modal { transform: translateY(0) scale(1); }

.modal-icon {
width: 48px; height: 48px;
border-radius: 50%;
margin: 0 auto 24px;
background: radial-gradient(circle at 35% 30%,
rgba(147, 197, 253, 0.4),
rgba(10, 22, 40, 0.95) 60%);
box-shadow: 0 0 30px rgba(59, 130, 246, 0.6);
border: 1px solid rgba(59, 130, 246, 0.4);
}

.modal h2 {
font-family: var(–cinzel);
font-size: 14px;
font-weight: 600;
letter-spacing: 0.22em;
text-transform: uppercase;
color: var(–accent);
margin-bottom: 16px;
}
.modal p {
font-family: var(–mono);
font-size: 14px;
color: var(–text);
line-height: 1.7;
margin-bottom: 32px;
}
.modal-close {
font-family: var(–cinzel);
font-size: 10px;
letter-spacing: 0.35em;
text-transform: uppercase;
color: var(–muted);
background: transparent;
border: 1px solid var(–border);
padding: 12px 28px;
border-radius: 6px;
cursor: pointer;
transition: all 0.3s ease;
}
.modal-close:hover {
color: #fff;
border-color: var(–accent);
box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
}

/* RESPONSIVE */
@media (max-width: 720px) {
nav.top-nav { padding: 18px 20px; }
.nav-links { gap: 18px; }
.nav-links a { font-size: 8px; letter-spacing: 0.28em; }
.wordmark { font-size: 12px; letter-spacing: 0.42em; }
.orb-wrap { width: 300px; height: 300px; }
.orb-body { width: 240px; height: 240px; }
.orb-glow-outer { inset: -100px; }
.hero { padding: 130px 20px 80px; min-height: 100vh; }
.hero-eyebrow { margin-bottom: 44px; font-size: 10px; }
.hero-footer { margin-top: 56px; }
}
</style>

</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="wordmark">Talon</a>
  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="privacy-policy.html">Privacy</a></li>
  </ul>
</nav>

<main class="hero">
  <p class="hero-eyebrow"><span class="line"></span>The gate is open<span class="line"></span></p>

  <a href="https://apps.apple.com/app/id6758687009" class="orb-wrap" id="orbLink" aria-label="Enter Talon">
    <div class="orb-glow-outer"></div>
    <div class="orb-glow-mid"></div>
    <div class="orb-body">
      <span class="orb-label">Step through</span>
    </div>
  </a>

  <div class="hero-footer">
    <h1 class="hero-headline">Talon &middot; Built to Win</h1>
    <p class="hero-tagline">What you build here, you keep</p>
  </div>
</main>

<footer class="site-footer">
  <p class="footer-mark">Talon &nbsp;&middot;&nbsp; &copy; 2026</p>
</footer>

<!-- COMING SOON MODAL — remove this entire block and the script below after App Store launch -->

<div id="modalOverlay" class="modal-overlay" aria-hidden="true">
  <div class="modal" role="dialog" aria-labelledby="modalTitle">
    <div class="modal-icon"></div>
    <h2 id="modalTitle">Almost Here</h2>
    <p>Talon is descending to the App Store soon. The orb will open the gates when it arrives.</p>
    <button class="modal-close" id="modalClose">Close</button>
  </div>
</div>

<script>
// Remove this script block after App Store launch — the orb link will then naturally open the store.
(function() {
  const orb = document.getElementById('orbLink');
  const overlay = document.getElementById('modalOverlay');
  const closeBtn = document.getElementById('modalClose');

  orb.addEventListener('click', function(e) {
    e.preventDefault();
    overlay.classList.add('active');
    overlay.setAttribute('aria-hidden', 'false');
  });

  function closeModal() {
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden', 'true');
  }

  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
})();
</script>

</body>
</html>
